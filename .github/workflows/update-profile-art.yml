name: Update profile art

# Re-scrapes your public contributions and re-renders the heatmap once a day.
# No token, no secrets — only reads GitHub's public contributions page and
# commits the refreshed SVG + JSON back to this repo.

on:
  schedule:
    - cron: "17 4 * * *"   # every day at 04:17 UTC
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # needed to commit the refreshed graph

concurrency:
  group: update-profile-art
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: 11lunaric11
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit refreshed graph
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution graph"
          git push
